name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: trishab2005
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=bf91f3&color_dots=#161B22,#2D133B,#5A189A,#7B2CBF,#9D4EDD

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
