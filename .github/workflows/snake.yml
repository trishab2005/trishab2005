name: Generate GitHub Snake

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/github-snake.svg?color_snake=%2339FF14&color_dots=%23161B22,%232D133B,%235A189A,%237B2CBF,%23C77DFF
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2339FF14&color_dots=%23161B22,%232D133B,%235A189A,%237B2CBF,%23C77DFF

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
